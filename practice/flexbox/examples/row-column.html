<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flexbox Row &amp; Column Example</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; padding: 1rem; }
    .flex-row {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }
    .flex-column {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .item {
      flex: 1;
      padding: 1rem;
      border-radius: 0.375rem;
      color: #fff;
      font-weight: 600;
      text-align: center;
    }
    .item:nth-child(1) { background-color: #6366f1; }
    .item:nth-child(2) { background-color: #8b5cf6; }
    .item:nth-child(3) { background-color: #3b82f6; }
  </style>
</head>
<body>
  <div class="flex-row">
    <div class="item">Item 1</div>
    <div class="item">Item 2</div>
    <div class="item">Item 3</div>
  </div>
  <div class="flex-column">
    <div class="item">Stacked 1</div>
    <div class="item">Stacked 2</div>
    <div class="item">Stacked 3</div>
  </div>
</body>
</html>
