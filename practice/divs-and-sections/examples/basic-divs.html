<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Basic Divs Example</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; padding: 1rem; }
    .layout { display: flex; flex-direction: column; gap: 0.5rem; }
    .layout__row { display: flex; gap: 0.5rem; }
    .box {
      padding: 1rem;
      border-radius: 0.375rem;
      color: #fff;
      font-weight: 600;
      text-align: center;
    }
    .box--header { background-color: #6366f1; }
    .box--sidebar { background-color: #8b5cf6; flex: 0 0 30%; }
    .box--main { background-color: #3b82f6; flex: 1; min-height: 8rem; }
    .box--footer { background-color: #64748b; }
  </style>
</head>
<body>
  <div class="layout">
    <div class="box box--header">Header</div>
    <div class="layout__row">
      <div class="box box--sidebar">Sidebar</div>
      <div class="box box--main">Main content</div>
    </div>
    <div class="box box--footer">Footer</div>
  </div>
</body>
</html>
