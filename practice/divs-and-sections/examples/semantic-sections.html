<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Semantic Sections Example</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; padding: 1rem; }
    header, main, section, footer {
      padding: 1rem;
      border-radius: 0.375rem;
      color: #fff;
      font-weight: 600;
      text-align: center;
    }
    header { background-color: #6366f1; }
    main { background-color: #3b82f6; min-height: 6rem; margin-top: 0.5rem; }
    section { background-color: #06b6d4; margin-top: 0.5rem; }
    footer { background-color: #64748b; margin-top: 0.5rem; }
  </style>
</head>
<body>
  <header>Site Header</header>
  <main>
    <p>Main content area</p>
    <section>Featured section</section>
  </main>
  <footer>Site Footer</footer>
</body>
</html>
