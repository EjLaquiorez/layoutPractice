<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Landing Page Anatomy — HTML Structure Visualizer</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f172a;
      --bg-elevated: #1e293b;
      --bg-card: #334155;
      --text: #f8fafc;
      --text-muted: #94a3b8;
      --text-dim: #64748b;
      --accent: #4f46e5;
      --accent-soft: #6366f1;
      --accent-glow: rgba(79, 70, 229, 0.3);
      --tag: #10b981;
      --tag-soft: #34d399;
      --border: #334155;
      --radius: 12px;
      --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
    }

    /* Header */
    .header {
      padding: 32px 24px;
      border-bottom: 1px solid var(--border);
      background: rgba(15, 23, 42, 0.8);
      backdrop-filter: blur(20px);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 16px;
    }

    .header h1 {
      font-size: 1.5rem;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .header p {
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    .legend {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .legend-dot {
      width: 12px;
      height: 12px;
      border-radius: 3px;
    }

    /* Layout */
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 24px;
      display: grid;
      grid-template-columns: 1fr 380px;
      gap: 40px;
    }

    @media (max-width: 1024px) {
      .container { grid-template-columns: 1fr; }
    }

    /* Tree View */
    .tree-panel {
      background: var(--bg-elevated);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      overflow: hidden;
    }

    .tree-header {
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .tree-header h2 {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .tree-body {
      padding: 16px 0;
      max-height: calc(100vh - 200px);
      overflow-y: auto;
    }

    .tree-body::-webkit-scrollbar { width: 6px; }
    .tree-body::-webkit-scrollbar-track { background: transparent; }
    .tree-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* Tree Node */
    .node {
      position: relative;
      padding-left: 24px;
      cursor: pointer;
      transition: var(--transition);
    }

    .node:hover {
      background: rgba(79, 70, 229, 0.05);
    }

    .node.active {
      background: rgba(79, 70, 229, 0.1);
    }

    .node-line {
      position: absolute;
      left: 12px;
      top: 0;
      bottom: 0;
      width: 1px;
      background: var(--border);
    }

    .node-content {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px 10px 8px;
      border-radius: 6px;
      margin-right: 8px;
    }

    .node-toggle {
      width: 16px;
      height: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-dim);
      font-size: 0.7rem;
      transition: var(--transition);
      flex-shrink: 0;
    }

    .node.collapsed .node-toggle { transform: rotate(-90deg); }
    .node.collapsed .node-children { display: none; }

    .node-tag {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8rem;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 4px;
      white-space: nowrap;
    }

    .tag-nav { background: #1e3a5f; color: #60a5fa; }
    .tag-section { background: #3f1e5f; color: #c084fc; }
    .tag-div { background: #1e3f2f; color: #34d399; }
    .tag-h1 { background: #5f1e1e; color: #f87171; }
    .tag-p { background: #5f4e1e; color: #fbbf24; }
    .tag-a { background: #1e2f5f; color: #818cf8; }
    .tag-form { background: #5f3f1e; color: #fb923c; }
    .tag-ul { background: #3f3f1e; color: #a3e635; }
    .tag-li { background: #2f3f1e; color: #84cc16; }
    .tag-button { background: #5f1e3f; color: #f472b6; }
    .tag-input { background: #3f1e3f; color: #e879f9; }
    .tag-footer { background: #1e1e3f; color: #a78bfa; }
    .tag-svg { background: #1e3f3f; color: #22d3ee; }
    .tag-script { background: #3f3f3f; color: #9ca3af; }
    .tag-span { background: #3f3f1e; color: #d4d4d8; }

    .node-class {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      color: var(--text-dim);
      margin-left: 4px;
    }

    .node-desc {
      font-size: 0.8rem;
      color: var(--text-dim);
      margin-left: auto;
      padding-left: 12px;
    }

    .node-children {
      position: relative;
    }

    .node-children::before {
      content: '';
      position: absolute;
      left: 12px;
      top: 0;
      bottom: 0;
      width: 1px;
      background: var(--border);
    }

    /* Detail Panel */
    .detail-panel {
      position: sticky;
      top: 120px;
      height: fit-content;
    }

    .detail-card {
      background: var(--bg-elevated);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      overflow: hidden;
      margin-bottom: 20px;
    }

    .detail-header {
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
    }

    .detail-header h3 {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .detail-body {
      padding: 24px;
    }

    .detail-tag {
      display: inline-block;
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.2rem;
      font-weight: 700;
      padding: 6px 14px;
      border-radius: 6px;
      margin-bottom: 16px;
    }

    .detail-title {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .detail-desc {
      color: var(--text-muted);
      font-size: 0.95rem;
      line-height: 1.7;
      margin-bottom: 20px;
    }

    .detail-meta {
      display: grid;
      gap: 12px;
    }

    .meta-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }

    .meta-label {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      min-width: 70px;
      padding-top: 2px;
    }

    .meta-value {
      font-size: 0.85rem;
      color: var(--text-muted);
      line-height: 1.5;
    }

    .meta-value code {
      font-family: 'JetBrains Mono', monospace;
      background: var(--bg-card);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.8rem;
      color: var(--accent-soft);
    }

    /* Code Preview */
    .code-preview {
      background: var(--bg);
      border-radius: 8px;
      padding: 16px;
      margin-top: 20px;
      overflow-x: auto;
    }

    .code-preview pre {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8rem;
      line-height: 1.6;
      color: var(--text-muted);
      white-space: pre-wrap;
      word-break: break-word;
    }

    .code-tag { color: #c084fc; }
    .code-attr { color: #60a5fa; }
    .code-string { color: #34d399; }
    .code-comment { color: var(--text-dim); font-style: italic; }

    /* Section Breakdown */
    .section-breakdown {
      margin-top: 60px;
      padding-top: 40px;
      border-top: 1px solid var(--border);
    }

    .section-breakdown h2 {
      font-size: 1.5rem;
      font-weight: 800;
      margin-bottom: 32px;
      text-align: center;
    }

    .breakdown-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
    }

    @media (max-width: 768px) {
      .breakdown-grid { grid-template-columns: 1fr; }
    }

    .breakdown-card {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
      transition: var(--transition);
    }

    .breakdown-card:hover {
      border-color: var(--accent);
      transform: translateY(-4px);
    }

    .breakdown-card h3 {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .breakdown-card h3 .tag {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      padding: 2px 8px;
      border-radius: 4px;
    }

    .breakdown-card p {
      color: var(--text-muted);
      font-size: 0.9rem;
      line-height: 1.7;
    }

    .breakdown-card .structure-list {
      list-style: none;
      margin-top: 16px;
    }

    .breakdown-card .structure-list li {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8rem;
      color: var(--text-dim);
      padding: 6px 0;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .breakdown-card .structure-list li:last-child { border-bottom: none; }

    .structure-list .indent { color: var(--text-dim); opacity: 0.5; }

    /* Interactive highlight */
    .highlight-box {
      position: fixed;
      pointer-events: none;
      border: 2px solid var(--accent);
      border-radius: 8px;
      background: var(--accent-glow);
      z-index: 1000;
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    .highlight-box.visible { opacity: 1; }
  </style>

    // Render tree recursively
    function renderTree(node, depth = 0) {
      const hasChildren = node.children && node.children.length > 0;
      const tagClass = `tag-${node.tag}`;

      let html = `
        <div class="node ${hasChildren ? '' : 'collapsed'}" data-tag="${node.tag}" data-class="${node.class || ''}" onclick="selectNode(this, event)">
          <div class="node-line" style="left: ${12 + depth * 24}px;"></div>
          <div class="node-content" style="padding-left: ${8 + depth * 24}px;">
            ${hasChildren ? `<span class="node-toggle" onclick="toggleNode(this, event)">▼</span>` : '<span class="node-toggle" style="opacity:0;">▸</span>'}
            <span class="node-tag ${tagClass}">&lt;${node.tag}&gt;</span>
            ${node.class ? `<span class="node-class">${node.class}</span>` : ''}
            ${node.desc ? `<span class="node-desc">${node.desc}</span>` : ''}
          </div>
          ${hasChildren ? `
            <div class="node-children">
              ${node.children.map(child => renderTree(child, depth + 1)).join('')}
            </div>
          ` : ''}
        </div>
      `;
      return html;
    }

    // Toggle node collapse
    function toggleNode(toggle, event) {
      event.stopPropagation();
      const node = toggle.closest('.node');
      node.classList.toggle('collapsed');
    }

    // Select node and show details
    function selectNode(nodeEl, event) {
      if (event.target.classList.contains('node-toggle')) return;

      document.querySelectorAll('.node').forEach(n => n.classList.remove('active'));
      nodeEl.classList.add('active');

      const tag = nodeEl.dataset.tag;
      const className = nodeEl.dataset.class;
      const nodeData = findNodeData(pageStructure, tag, className);

      if (nodeData) {
        showDetail(nodeData);
      }
    }

    // Find node in data structure
    function findNodeData(root, tag, className) {
      if (root.tag === tag && (root.class || '') === (className || '')) return root;
      if (root.children) {
        for (const child of root.children) {
          const found = findNodeData(child, tag, className);
          if (found) return found;
        }
      }
      return null;
    }

    // Show detail panel
    function showDetail(node) {
      const tagClass = `tag-${node.tag}`;
      const detailBody = document.getElementById('detailBody');

      detailBody.innerHTML = `
        <span class="detail-tag ${tagClass}">&lt;${node.tag}&gt;</span>
        <div class="detail-title">${node.desc || node.tag}</div>
        <div class="detail-desc">${node.purpose || ''}</div>
        <div class="detail-meta">
          ${node.why ? `
            <div class="meta-item">
              <span class="meta-label">Why</span>
              <span class="meta-value">${node.why}</span>
            </div>
          ` : ''}
          ${node.class ? `
            <div class="meta-item">
              <span class="meta-label">Class</span>
              <span class="meta-value"><code>${node.class}</code></span>
            </div>
          ` : ''}
          <div class="meta-item">
            <span class="meta-label">Type</span>
            <span class="meta-value">${getElementType(node.tag)}</span>
          </div>
        </div>
        ${node.code ? `
          <div class="code-preview">
            <pre>${highlightCode(node.code)}</pre>
          </div>
        ` : ''}
      `;
    }

    function getElementType(tag) {
      const types = {
        'nav': 'Semantic — Navigation landmark',
        'section': 'Semantic — Thematic grouping',
        'div': 'Generic — Layout container',
        'h1': 'Semantic — Page heading (level 1)',
        'h2': 'Semantic — Section heading (level 2)',
        'h3': 'Semantic — Sub-heading (level 3)',
        'h4': 'Semantic — Sub-heading (level 4)',
        'p': 'Semantic — Paragraph text',
        'a': 'Semantic — Anchor link',
        'button': 'Semantic — Interactive button',
        'input': 'Semantic — Form input',
        'form': 'Semantic — Form container',
        'ul': 'Semantic — Unordered list',
        'li': 'Semantic — List item',
        'span': 'Generic — Inline container',
        'svg': 'Embedded — Scalable vector graphic',
        'script': 'Embedded — JavaScript',
        'html': 'Root — Document root',
        'head': 'Metadata — Document head',
        'body': 'Root — Document body',
        'footer': 'Semantic — Footer landmark'
      };
      return types[tag] || 'HTML Element';
    }

    function highlightCode(code) {
      return code
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/(&lt;\/?)([\w-]+)/g, '<span class="code-tag">$1$2</span>')
        .replace(/(\s)([\w-]+)(=)/g, '$1<span class="code-attr">$2</span>$3')
        .replace(/"([^"]*)"/g, '<span class="code-string">"$1"</span>')
        .replace(/(&lt;!--.*?--&gt;)/g, '<span class="code-comment">$1</span>');
    }
